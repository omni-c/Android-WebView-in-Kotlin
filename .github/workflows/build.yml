name: Build Android APK
on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Lay ma nguon
        uses: actions/checkout@v4

      - name: Cai dat JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Tai Stockfish va Nhap vao App
        run: |
          mkdir -p app/src/main/assets
          wget https://github.com/official-stockfish/Stockfish/releases/latest/download/stockfish-android-armv8.tar -O stockfish.tar
          tar -xf stockfish.tar
          find . -type f -name "*stockfish-android-armv8*" -exec mv {} app/src/main/assets/stockfish \;
          chmod +x app/src/main/assets/stockfish

      - name: Cap quyen chay Gradle
        run: chmod +x gradlew

      - name: Tien hanh Build APK
        run: ./gradlew assembleDebug

      - name: Xuat file APK
        uses: actions/upload-artifact@v4
        with:
          name: Native-ChessBot
          path: app/build/outputs/apk/debug/*.apk
